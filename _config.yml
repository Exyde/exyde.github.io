### Site Settings ###
title               : Exyde - Sly
description         : >-
                      Hello there. Welcome to my online notebook-portfolio thing.
                      Enjoy your stay here. :purple_heart:
baseurl             : ""
repository          : Exyde/exyde.github.io
remote_theme        : YoussefRaafatNasry/portfolYOU
open_new_tab        : true
#url: https://exyde.github.io
#domain: exyde.github.io
#theme: jekyll-theme-hacker

### Plugins ###
plugins:
  - jemoji
# - jekyll-feed
